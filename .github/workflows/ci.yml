name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  core-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python verifier deps
        run: pip install rapidfuzz

      - name: Install root dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Verification tests
        run: npm run test:verification

      - name: Cluster parity harness
        run: npm run test:cluster-parity

  dashboard-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci

      - name: Dashboard lint
        run: npm run lint

      - name: Dashboard build
        run: npm run build
