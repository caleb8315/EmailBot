name: Daily Intelligence Briefing

on:
  # Every morning at 13:00 UTC (7 AM Mountain / Denver)
  schedule:
    - cron: '0 13 * * *'

  # Manual trigger — click "Run workflow" in GitHub Actions tab anytime
  workflow_dispatch:

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run briefing pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python main.py

      - name: Save tracking data (sentiment, threads)
        run: |
          git config user.name "News Intel Bot"
          git config user.email "bot@newsintel.local"
          git add data/
          git diff --cached --quiet || git commit -m "Auto-update tracking data [skip ci]"
          git push

      - name: Upload briefing as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: briefing-${{ github.run_id }}
          path: output/
          retention-days: 30
